<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoleculeOS先锋伙伴共创计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            background: linear-gradient(160deg, #0D0B1A 0%, #141428 40%, #1A1040 70%, #0D0B1A 100%);
            padding: 0;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Subtle ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(102, 96, 196, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -15%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(114, 46, 209, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Form container */
        .form-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 28px 24px 24px;
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            animation: fadeInUp 0.5s ease-out;
            align-self: center;
        }

        /* Safe area for phones with notch/home indicator */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Company Logo */
        .company-logo {
            text-align: center;
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(102, 96, 196, 0.1);
        }

        .company-logo img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Form title */
        .form-title {
            font-size: 19px;
            font-weight: 600;
            color: #111928;
            letter-spacing: 0.3px;
            line-height: 1.45;
            text-align: center;
            margin-bottom: 22px;
        }

        /* Form fields */
        .form-group {
            margin-bottom: 14px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #111928;
            margin-bottom: 5px;
        }

        .form-label .required-dot {
            color: #FC5E32;
            font-size: 7px;
            vertical-align: middle;
            margin-left: 2px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: #F9F9F9;
            border: 1px solid transparent;
            border-radius: 6px;
            color: #111928;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-input:hover {
            border-color: #BDBDE9;
        }

        .form-input:focus {
            border-color: #6660C4;
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(102, 96, 196, 0.1);
        }

        .form-input::placeholder {
            color: rgba(110, 110, 120, 0.4);
            font-size: 13px;
        }

        /* Radio group - mobile friendly vertical */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 3px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: #F9F9F9;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .radio-option:hover {
            border-color: #BDBDE9;
            background: #ffffff;
        }

        .radio-option.selected {
            border-color: #6660C4;
            background: #ffffff;
        }

        .radio-circle {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(189, 189, 233, 0.5);
            border-radius: 50%;
            margin-right: 8px;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .radio-option.selected .radio-circle {
            border-color: #6660C4;
        }

        .radio-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 7px;
            height: 7px;
            background: #6660C4;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .radio-option.selected .radio-circle::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .radio-text {
            font-size: 14px;
            color: #6E6E78;
            transition: color 0.2s ease;
        }

        .radio-option.selected .radio-text {
            color: #111928;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(90deg, #6660C4 0%, #5851B0 40%, #722ED1 80%, #EB2F96 100%);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .submit-btn:hover {
            box-shadow: 0 4px 16px rgba(102, 96, 196, 0.35);
        }

        .submit-btn:active {
            transform: scale(0.97);
        }

                /* Textarea for AI tools */
        textarea.form-input {
            resize: vertical;
            min-height: 60px;
            line-height: 1.5;
        }

        .ai-detail-group {
            overflow: hidden;
        }

        /* QR Code section on success page */
        .qrcode-section {
            margin: 20px auto 24px;
            padding: 16px;
            background: #FAFAFC;
            border-radius: 6px;
            border: 1px solid rgba(102, 96, 196, 0.08);
        }

        .qrcode-img {
            width: 200px;
            height: auto;
            display: block;
            margin: 0 auto 12px;
            border-radius: 4px;
        }

        .qrcode-hint {
            font-size: 12.5px;
            color: #6660C4;
            line-height: 1.7;
            margin: 0;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Validation */
        .form-input.error {
            border-color: #FC5E32;
            background: #fff;
        }

        .error-msg {
            font-size: 12px;
            color: #FC5E32;
            margin-top: 3px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Success page */
        .success-page {
            display: none;
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }

        .success-page.active {
            display: block;
        }

        .success-page .company-logo {
            border-bottom: none;
            margin-bottom: 16px;
            padding-bottom: 0;
        }

        .success-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
        }

        .success-icon .circle-inner {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6660C4, #722ED1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(102, 96, 196, 0.25);
        }

        .success-icon .check-mark {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .success-title {
            font-size: 20px;
            font-weight: 700;
            color: #111928;
            margin-bottom: 6px;
        }

        .success-divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #6660C4, #BDBDE9, transparent);
            border-radius: 2px;
            margin: 12px auto;
        }

        .success-subtitle {
            font-size: 13px;
            color: #6E6E78;
            line-height: 1.65;
            margin-bottom: 28px;
        }

        .success-link {
            display: inline-block;
            padding: 11px 28px;
            background: linear-gradient(90deg, #6660C4, #722ED1);
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .success-link:active {
            transform: scale(0.97);
        }
    </style>
</head>

            <form id="registrationForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label">姓名<span class="required-dot">●</span></label>
                    <input type="text" class="form-input" id="name" placeholder="请输入您的姓名" required>
                    <div class="error-msg" id="nameError">请填写姓名</div>
                </div>

                <div class="form-group">
                    <label class="form-label">电话<span class="required-dot">●</span></label>
                    <input type="tel" class="form-input" id="phone" placeholder="请输入您的手机号码" required>
                    <div class="error-msg" id="phoneError">请填写有效的手机号码</div>
                </div>

                <div class="form-group">
                    <label class="form-label">邮箱<span class="required-dot">●</span></label>
                    <input type="email" class="form-input" id="email" placeholder="请输入您的邮箱地址" required>
                    <div class="error-msg" id="emailError">请填写有效的邮箱地址</div>
                </div>

                <div class="form-group">
                    <label class="form-label">公司/机构<span class="required-dot">●</span></label>
                    <input type="text" class="form-input" id="company" placeholder="请输入您所在的公司或机构名称" required>
                    <div class="error-msg" id="companyError">请填写公司/机构名称</div>
                </div>

                <div class="form-group">
                    <label class="form-label">所属部门</label>
                    <input type="text" class="form-input" id="department" placeholder="请输入您所在的部门">
                </div>

                <div class="form-group">
                    <label class="form-label">您是否曾使用过其他AI平台辅助您开展研发工作？<span class="required-dot">●</span></label>
                    <div class="radio-group" id="aiPlatformGroup">
                        <div class="radio-option" onclick="selectRadio(this, 'aiPlatform', '是')">
                            <div class="radio-circle"></div>
                            <span class="radio-text">是</span>
                        </div>
                        <div class="radio-option" onclick="selectRadio(this, 'aiPlatform', '否')">
                            <div class="radio-circle"></div>
                            <span class="radio-text">否</span>
                        </div>
                    </div>
                    <div class="error-msg" id="aiPlatformError">请选择一项</div>
                <div class="form-group ai-detail-group" id="aiDetailGroup" style="display:none;">
                    <label class="form-label">请列举几个您最常使用的AIDD/CADD平台或工具</label>
                    <textarea class="form-input" id="aiTools" rows="3" placeholder="如：Schrödinger、AutoDock、AlphaFold等"></textarea>
                </div>
                </div>

                <button type="submit" class="submit-btn">提 交</button>
            </form>

    <script>
        let selectedAiPlatform = '';

        function selectRadio(element, group, value) {
            const siblings = element.parentElement.querySelectorAll('.radio-option');
            siblings.forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedAiPlatform = value;
            document.getElementById('aiPlatformError').classList.remove('show');
            
            const detailGroup = document.getElementById('aiDetailGroup');
            if (detailGroup) {
                if (value === '是') {
                    detailGroup.style.display = 'block';
                    setTimeout(() => {
                        detailGroup.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 150);
                } else {
                    detailGroup.style.display = 'none';
                }
            }
        }

        function validateForm() {
            let isValid = true;

            const name = document.getElementById('name').value.trim();
            if (!name) {
                document.getElementById('name').classList.add('error');
                document.getElementById('nameError').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('name').classList.remove('error');
                document.getElementById('nameError').classList.remove('show');
            }

            const phone = document.getElementById('phone').value.trim();
            const phoneRegex = /^1[3-9]\d{9}$|^(\+\d{1,3})?\d{6,14}$/;
            if (!phone || !phoneRegex.test(phone)) {
                document.getElementById('phone').classList.add('error');
                document.getElementById('phoneError').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('phone').classList.remove('error');
                document.getElementById('phoneError').classList.remove('show');
            }

            const email = document.getElementById('email').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                document.getElementById('email').classList.add('error');
                document.getElementById('emailError').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('email').classList.remove('error');
                document.getElementById('emailError').classList.remove('show');
            }

            const company = document.getElementById('company').value.trim();
            if (!company) {
                document.getElementById('company').classList.add('error');
                document.getElementById('companyError').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('company').classList.remove('error');
                document.getElementById('companyError').classList.remove('show');
            }

            if (!selectedAiPlatform) {
                document.getElementById('aiPlatformError').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('aiPlatformError').classList.remove('show');
            }

            return isValid;
        }

        function handleSubmit(event) {
            event.preventDefault();
            if (!validateForm()) return;

            const formData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                company: document.getElementById('company').value.trim(),
                department: document.getElementById('department').value.trim(),
                usedAiPlatform: selectedAiPlatform,
                aiTools: document.getElementById('aiTools') ? document.getElementById('aiTools').value.trim() : ''
            };

            console.log('Submitting form data:', formData);

            // Disable submit button to prevent double submission
            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            submitBtn.style.opacity = '0.7';

            // POST to backend server - API_BASE_URL is configurable for deployment
            const API_BASE = window.MOS_API_BASE || '';
            fetch(API_BASE + '/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('formPage').style.display = 'none';
                    document.getElementById('successPage').classList.add('active');
                } else {
                    alert(data.message || '提交失败，请稍后重试');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提 交';
                    submitBtn.style.opacity = '1';
                }
            })
            .catch(err => {
                console.error('Submit error:', err);
                alert('提交失败，请检查网络连接后重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '提 交';
                submitBtn.style.opacity = '1';
            });
        }

        // Real-time validation clearing
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                if (this.classList.contains('error')) {
                    this.classList.remove('error');
                    const errorMsg = this.parentElement.querySelector('.error-msg');
                    if (errorMsg) errorMsg.classList.remove('show');
                }
            });
        });
    </script>
